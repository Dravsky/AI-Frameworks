services:

  frontend:
    container_name: frontend
    build: ./frontend
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      BACKEND_URL: http://api:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - ai-dev-network
    volumes:
      - ./frontend:/app
      - /app/node_modules

  api:
    container_name: api
    build: ./backend
    environment:
      MONGO_URL: mongodb://db:27017
      MODEL_SERVICE_URL: http://model-service:8001
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_started
      model-service:
        condition: service_healthy
    networks:
      - ai-dev-network
    volumes:
      - ./backend:/app

  db:
    container_name: db
    image: mongo:latest
    ports:
      - "27017:27017"
    networks:
      - ai-dev-network
    volumes:
      - db-data:/data/db

  model-service:
    container_name: model-service
    build: ./model_service
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ai-dev-network
    volumes:
      - ./model_service:/app

networks:
  ai-dev-network:

volumes:
  db-data: